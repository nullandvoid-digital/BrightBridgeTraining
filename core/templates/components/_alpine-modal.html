<div x-data="{ modal : false }"
     @show-modal.window="modal = ! modal"
     @reset.window="$nextTick(() => { $refs.modal.remove(); modal = false })"
     x-ref="modal">
    <div class="modal is-flex-shrink-1" id="modal-wrapper" x-cloak x-show.important="modal" x-transition>
        <div class="modal-background" @click="$dispatch('reset')"></div>
    </div>
</div>
